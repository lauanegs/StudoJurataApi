spring.datasource.url=jdbc:postgresql://localhost:5432/studojurata
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Correcao 5.3/10.5 da Segunda Analise Critica: "expiracao de sessao" real
# (timeout por inatividade), complementar ao maximumSessions(1) do
# SecurityConfig, que so limita sessoes concorrentes.
server.servlet.session.timeout=30m